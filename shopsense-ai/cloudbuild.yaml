steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/shopsense-ai-backend', './backend']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/shopsense-ai-backend']
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    args:
      - gcloud
      - run
      - deploy
      - shopsense-ai-backend
      - --image=gcr.io/$PROJECT_ID/shopsense-ai-backend
      - --region=us-central1
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --memory=512Mi
      - --cpu=1
      - --max-instances=10
      - --set-secrets=GEMINI_API_KEY=GEMINI_API_KEY:latest
      - --set-secrets=GOOGLE_API_KEY=GOOGLE_API_KEY:latest
      - --set-secrets=GOOGLE_CSE_ID=GOOGLE_CSE_ID:latest
images:
  - 'gcr.io/$PROJECT_ID/shopsense-ai-backend'
